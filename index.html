<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCGPocket - Collection Complète</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.8rem 2rem;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid transparent;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            border-color: #ffd700;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Sections */
        .packs-section, .collection-section {
            transition: opacity 0.3s ease;
        }

        .collection-section {
            display: none;
        }

        .collection-section.active {
            display: block;
        }

        /* Series Selector */
        .series-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .series-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid transparent;
        }

        .series-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            transform: scale(1.05);
            border-color: white;
        }

        .series-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Stats */
        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .stat-label {
            color: white;
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Packs Grid */
        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .pack-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .pack-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b, #ffd700);
        }

        .pack-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 20px 30px rgba(255, 215, 0, 0.2);
        }

        .pack-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pack-image {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }

        .pack-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
        }

        .pack-price {
            color: #ffd700;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .pack-count {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-weight: bold;
        }

        /* Pack Opening */
        .pack-opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .pack-opening.active {
            opacity: 1;
            pointer-events: all;
        }

        .opening-container {
            text-align: center;
            color: white;
        }

        .opening-title {
            font-size: 2rem;
            color: #ffd700;
            margin-bottom: 2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .card-reveal {
            width: 400px;
            height: 560px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            animation: cardAppear 0.5s ease;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: scale(0.5) rotateY(180deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0);
            }
        }

        .card-reveal img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.3);
        }

        .card-info {
            margin-top: 2rem;
            font-size: 1.5rem;
        }

        .card-name {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .card-rarity-badge {
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 30px;
            font-weight: bold;
            margin-top: 1rem;
        }

        .card-rarity-badge.commune { background: #808080; }
        .card-rarity-badge.rare { background: #4169e1; }
        .card-rarity-badge.ultra-rare { background: linear-gradient(135deg, #ffd700, #ff6b6b); color: #1a1a2e; }

        .opening-progress {
            margin-top: 2rem;
            font-size: 1.2rem;
        }

        .progress-bar {
            width: 400px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            margin: 1rem auto;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            transition: width 0.3s ease;
        }

        .next-card-btn {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 30px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }

        .next-card-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .close-opening {
            position: absolute;
            top: 2rem;
            right: 2rem;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ffd700;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-opening:hover {
            background: #ffd700;
            color: #1a1a2e;
        }

        /* Collection Filters */
        .collection-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid transparent;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Collection Grid */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .collection-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
        }

        .collection-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .collection-card.ultra-rare {
            border-color: gold;
            box-shadow: 0 0 20px gold;
        }

        .collection-card.rare {
            border-color: silver;
        }

        .collection-card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 10px;
        }

        .card-rarity-tag {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            padding: 0.2rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
        }

        .card-name {
            color: white;
            font-weight: bold;
            margin: 0.5rem 0;
        }

        .card-series {
            color: #ffd700;
            font-size: 0.9rem;
        }

        .card-count {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: #28a745;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
