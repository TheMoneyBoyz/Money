<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Boosters - Collection TCGPocket</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Header avec navigation */
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        /* Conteneur principal */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Section Packs */
        .packs-section {
            display: block;
        }

        .packs-section.hidden {
            display: none;
        }

        .series-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .series-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #333;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .series-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: scale(1.05);
        }

        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .pack-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .pack-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #ffd700, #ffa500, #ff8c00);
        }

        .pack-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .pack-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pack-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .pack-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .pack-price {
            color: #666;
            margin-bottom: 1rem;
        }

        .pack-count {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #667eea;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
        }

        /* Animation d'ouverture de pack */
        .pack-opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .pack-opening.active {
            opacity: 1;
            pointer-events: all;
        }

        .opening-animation {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            color: white;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .pack-opening.active .opening-animation {
            transform: scale(1);
        }

        .opening-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .opening-card {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            animation: cardReveal 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-opening {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: white;
            border: none;
            border-radius: 30px;
            color: #667eea;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-opening:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }

        /* Section Collection */
        .collection-section {
            display: none;
        }

        .collection-section.active {
            display: block;
        }

        .collection-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .collection-card {
            background: white;
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            cursor: pointer;
        }

        .collection-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .collection-card.rare {
            border: 3px solid gold;
        }

        .card-rarity {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            background: #667eea;
            color: white;
        }

        .card-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-name {
            font-weight: bold;
            margin-bottom: 0.3rem;
        }

        .card-series {
            color: #666;
            font-size: 0.8rem;
        }

        .card-count {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: #28a745;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.7rem;
        }

        /* Statistiques */
        .stats-bar {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            color: #666;
        }

        /* Loading */
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 2rem 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <div class="logo" onclick="switchSection('packs')">Pokémon TCGPocket</div>
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="switchSection('packs')">Boosters</button>
                <button class="nav-btn" onclick="switchSection('collection')">Ma Collection</button>
            </div>
        </div>
    </div>

    <!-- Section Packs -->
    <div class="container packs-section" id="packsSection">
        <div class="series-selector">
            <button class="series-btn active" onclick="filterSeries('all')">Toutes les séries</button>
            <button class="series-btn" onclick="filterSeries('151')">151</button>
            <button class="series-btn" onclick="filterSeries('ecarlate')">Écarlate et Violet</button>
            <button class="series-btn" onclick="filterSeries('evolving')">Évolutions célestes</button>
            <button class="series-btn" onclick="filterSeries('transendants')">Héros transendants</button>
            <button class="series-btn" onclick="filterSeries('gx')">GX Ultra</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="packCount">10</div>
                <div class="stat-label">Boosters disponibles</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Cartes collectionnées</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="uniqueCards">0</div>
                <div class="stat-label">Cartes uniques</div>
            </div>
        </div>

        <div class="packs-grid" id="packsGrid">
            <!-- Les packs seront générés ici par JavaScript -->
        </div>
    </div>

    <!-- Section Collection -->
    <div class="container collection-section" id="collectionSection">
        <div class="collection-filters">
            <button class="filter-btn active" onclick="filterCollection('all')">Toutes</button>
            <button class="filter-btn" onclick="filterCollection('commune')">Communes</button>
            <button class="filter-btn" onclick="filterCollection('rare')">Rares</button>
            <button class="filter-btn" onclick="filterCollection('ultra-rare')">Ultra Rares</button>
            <button class="filter-btn" onclick="filterCollection('151')">Série 151</button>
            <button class="filter-btn" onclick="filterCollection('ecarlate')">Écarlate et Violet</button>
        </div>

        <div class="collection-grid" id="collectionGrid">
            <!-- Les cartes de la collection seront générées ici -->
        </div>
    </div>

    <!-- Animation d'ouverture de pack -->
    <div class="pack-opening" id="packOpening">
        <div class="opening-animation">
            <h2>Ouverture du booster...</h2>
            <div class="opening-cards" id="openingCards">
                <!-- Les cartes ouvertes apparaîtront ici -->
            </div>
            <button class="close-opening" onclick="closePackOpening()">Fermer</button>
        </div>
    </div>

    <script>
        // Données des cartes par série
        const cardDatabase = {
            '151': [
                { name: 'Bulbizarre', rarity: 'commune', image: '🌱' },
                { name: 'Salamèche', rarity: 'commune', image: '🔥' },
                { name: 'Carapuce', rarity: 'commune', image: '💧' },
                { name: 'Pikachu', rarity: 'commune', image: '⚡' },
                { name: 'Mewtwo', rarity: 'ultra-rare', image: '🔮' },
                { name: 'Dracaufeu', rarity: 'rare', image: '🐉' },
                { name: 'Tortank', rarity: 'rare', image: '🐢' },
                { name: 'Florizarre', rarity: 'rare', image: '🌿' }
            ],
            'ecarlate': [
                { name: 'Poussacha', rarity: 'commune', image: '😺' },
                { name: 'Chochodile', rarity: 'commune', image: '🐊' },
                { name: 'Coiffeton', rarity: 'commune', image: '🦆' },
                { name: 'Miraidon', rarity: 'ultra-rare', image: '⚡' },
                { name: 'Koraidon', rarity: 'ultra-rare', image: '🦎' }
            ],
            'evolving': [
                { name: 'Évoli', rarity: 'commune', image: '🌈' },
                { name: 'Pyroli', rarity: 'rare', image: '🔥' },
                { name: 'Aquali', rarity: 'rare', image: '💧' },
                { name: 'Voltali', rarity: 'rare', image: '⚡' },
                { name: 'Mentali', rarity: 'rare', image: '🔮' }
            ],
            'transendants': [
                { name: 'Dracofeu', rarity: 'ultra-rare', image: '🐲' },
                { name: 'Lugia', rarity: 'ultra-rare', image: '🕊️' },
                { name: 'Ho-Oh', rarity: 'ultra-rare', image: '🦚' },
                { name: 'Rayquaza', rarity: 'rare', image: '🌪️' }
            ],
            'gx': [
                { name: 'Pikachu GX', rarity: 'ultra-rare', image: '⚡⭐' },
                { name: 'Dracaufeu GX', rarity: 'ultra-rare', image: '🔥⭐' },
                { name: 'Mewtwo GX', rarity: 'ultra-rare', image: '🔮⭐' },
                { name: 'Ectoplasma GX', rarity: 'rare', image: '👻' }
            ]
        };

        // Collection de l'utilisateur
        let userCollection = [];
        
        // Boosters disponibles
        let availablePacks = 10;

        // Série actuellement sélectionnée
        let currentSeries = 'all';

        // Charger la collection depuis le localStorage
        function loadCollection() {
            const saved = localStorage.getItem('pokemonCollection');
            if (saved) {
                userCollection = JSON.parse(saved);
            }
            updateStats();
        }

        // Sauvegarder la collection
        function saveCollection() {
            localStorage.setItem('pokemonCollection', JSON.stringify(userCollection));
            updateStats();
        }

        // Mettre à jour les statistiques
        function updateStats() {
            document.getElementById('packCount').textContent = availablePacks;
            document.getElementById('totalCards').textContent = userCollection.length;
            
            const uniqueCards = new Set(userCollection.map(card => 
                card.series + '-' + card.name
            )).size;
            document.getElementById('uniqueCards').textContent = uniqueCards;
        }

        // Générer l'affichage des packs
        function renderPacks() {
            const packsGrid = document.getElementById('packsGrid');
            packsGrid.innerHTML = '';
            
            const series = currentSeries === 'all' 
                ? Object.keys(cardDatabase) 
                : [currentSeries];

            series.forEach(seriesName => {
                const packCount = 3; // Nombre de packs par série
                const seriesDisplay = {
                    '151': '151',
                    'ecarlate': 'Écarlate et Violet',
                    'evolving': 'Évolutions célestes',
                    'transendants': 'Héros transendants',
                    'gx': 'GX Ultra'
                }[seriesName] || seriesName;

                for (let i = 0; i < packCount; i++) {
                    const pack = document.createElement('div');
                    pack.className = `pack-card ${availablePacks <= 0 ? 'disabled' : ''}`;
                    pack.onclick = () => openPack(seriesName);
                    
                    pack.innerHTML = `
                        <div class="pack-icon">🎴</div>
                        <div class="pack-name">Booster ${seriesDisplay}</div>
                        <div class="pack-price">5 cartes</div>
                        <div class="pack-count">${i + 1}/3</div>
                    `;
                    
                    packsGrid.appendChild(pack);
                }
            });
        }

        // Ouvrir un pack
        function openPack(series) {
            if (availablePacks <= 0) {
                alert('Plus de boosters disponibles ! Revenez plus tard !');
                return;
            }

            availablePacks--;
            
            // Sélectionner 5 cartes aléatoires de la série
            const seriesCards = cardDatabase[series];
            const openedCards = [];
            
            for (let i = 0; i < 5; i++) {
                const randomCard = {...seriesCards[Math.floor(Math.random() * seriesCards.length)]};
                randomCard.series = series;
                randomCard.id = Date.now() + i + Math.random();
                openedCards.push(randomCard);
                
                // Ajouter à la collection
                userCollection.push(randomCard);
            }

            // Afficher l'animation
            showPackOpening(openedCards);
            
            // Sauvegarder et mettre à jour
            saveCollection();
            renderPacks();
            if (document.getElementById('collectionSection').classList.contains('active')) {
                renderCollection();
            }
        }

        // Afficher l'animation d'ouverture
        function showPackOpening(cards) {
            const opening = document.getElementById('packOpening');
            const cardsContainer = document.getElementById('openingCards');
            
            cardsContainer.innerHTML = '';
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'opening-card';
                cardEl.style.animationDelay = `${index * 0.1}s`;
                cardEl.innerHTML = `
                    <div class="card-image" style="font-size: 2rem;">${card.image}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-rarity">${card.rarity}</div>
                `;
                cardsContainer.appendChild(cardEl);
            });
            
            opening.classList.add('active');
        }

        // Fermer l'animation
        function closePackOpening() {
            document.getElementById('packOpening').classList.remove('active');
        }

        // Filtrer les séries
        function filterSeries(series) {
            currentSeries = series;
            
            // Mettre à jour les boutons
            document.querySelectorAll('.series-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderPacks();
        }

        // Changer de section
        function switchSection(section) {
            const packsSection = document.getElementById('packsSection');
            const collectionSection = document.getElementById('collectionSection');
            const navBtns = document.querySelectorAll('.nav-btn');
            
            if (section === 'packs') {
                packsSection.style.display = 'block';
                collectionSection.classList.remove('active');
                navBtns[0].classList.add('active');
                navBtns[1].classList.remove('active');
                renderPacks();
            } else {
                packsSection.style.display = 'none';
                collectionSection.classList.add('active');
                navBtns[0].classList.remove('active');
                navBtns[1].classList.add('active');
                renderCollection();
            }
        }

        // Afficher la collection
        function renderCollection(filter = 'all') {
            const collectionGrid = document.getElementById('collectionGrid');
            collectionGrid.innerHTML = '';
            
            let filteredCards = [...userCollection];
            
            // Appliquer les filtres
            if (filter !== 'all') {
                if (filter === 'commune' || filter === 'rare' || filter === 'ultra-rare') {
                    filteredCards = filteredCards.filter(card => card.rarity === filter);
                } else {
                    filteredCards = filteredCards.filter(card => card.series === filter);
                }
            }
            
            // Compter les doublons
            const cardCounts = {};
            filteredCards.forEach(card => {
                const key = card.series + '-' + card.name;
                cardCounts[key] = (cardCounts[key] || 0) + 1;
            });
            
            // Afficher les cartes sans doublons
            const uniqueCards = [];
            const seen = new Set();
            
            filteredCards.forEach(card => {
                const key = card.series + '-' + card.name;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueCards.push({
                        ...card,
                        count: cardCounts[key]
                    });
                }
            });
            
            uniqueCards.sort((a, b) => a.name.localeCompare(b.name));
            
            uniqueCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `collection-card ${card.rarity === 'ultra-rare' ? 'rare' : ''}`;
                cardEl.innerHTML = `
                    <div class="card-rarity">${card.rarity}</div>
                    <div class="card-image">${card.image}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-series">${card.series}</div>
                    <div class="card-count">x${card.count}</div>
                `;
                collectionGrid.appendChild(cardEl);
            });
            
            if (uniqueCards.length === 0) {
                collectionGrid.innerHTML = '<div class="loading">Aucune carte dans cette catégorie</div>';
            }
        }

        // Filtrer la collection
        function filterCollection(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderCollection(filter);
        }

        // Initialisation
        loadCollection();
        renderPacks();
        
        // Ajouter des packs tous les jours (simulation)
        setInterval(() => {
            availablePacks = Math.min(availablePacks + 1, 10);
            updateStats();
            renderPacks();
        }, 3600000); // 1 heure en millisecondes
    </script>
</body>
</html>
