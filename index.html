<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 MegaPlateforme - Pokémon, Crypto & Casino 🌟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Navigation */
        .navbar {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid gold;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            color: gold;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .nav-link:hover {
            border-color: gold;
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: gold;
            color: black;
        }

        /* Sections */
        .section {
            display: none;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
            animation: fadeIn 0.5s;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cartes communes */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 2px solid gold;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* ========== SECTION POKÉMON ========== */
        .pokemon-header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .pokemon-header h2 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .grade-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .grade-card {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            text-align: center;
        }

        .grade-card h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .card-preview {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border: 3px solid #333;
        }

        .card-preview img {
            width: 100%;
            max-width: 200px;
            height: auto;
        }

            font-weight: bold;
            color: #333;
            margin: 10px
