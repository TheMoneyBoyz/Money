<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCGPocket - Collection de Cartes Réelles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            border: none;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        .packs-section {
            display: block;
        }

        .packs-section.hidden {
            display: none;
        }

        .series-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .series-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .series-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            transform: scale(1.05);
            border: none;
        }

        .series-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .pack-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pack-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #ffd700, #ffa500, #ff6b6b);
        }

        .pack-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .pack-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pack-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 1rem;
            border-radius: 15px;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }

        .pack-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .pack-price {
            color: #ffd700;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .pack-count {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .pack-opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .pack-opening.active {
            opacity: 1;
            pointer-events: all;
        }

        .opening-animation {
            background: linear-gradient(135deg, #2a2a40, #1e1e2f);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            color: white;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
            max-width: 1200px;
            width: 90%;
        }

        .pack-opening.active .opening-animation {
            transform: scale(1);
        }

        .opening-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .opening-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1rem;
            animation: cardReveal 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .opening-card:hover {
            transform: translateY(-5px) scale(1.05);
            border-color: #ffd700;
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .opening-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .close-opening {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            border-radius: 30px;
            color: #1e1e2f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .close-opening:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .collection-section {
            display: none;
        }

        .collection-section.active {
            display: block;
        }

        .collection-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .collection-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .collection-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ffd700;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2);
        }

        .collection-card.ultra-rare {
            border: 3px solid gold;
            box-shadow: 0 0 20px gold;
        }

        .collection-card.rare {
            border: 2px solid silver;
        }

        .card-rarity {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            font-weight: bold;
            z-index: 2;
        }

        .collection-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        .card-name {
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: white;
            font-size: 1.1rem;
        }

        .card-series {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .card-count {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: #28a745;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .stat-label {
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 2rem 0;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1e1e2f;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #ffa500, #ff6b6b);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <div class="logo" id="logoBtn">Pokémon TCGPocket</div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="packsBtn">Boosters</button>
                <button class="nav-btn" id="collectionBtn">Ma Collection</button>
            </div>

    </div>

    <div class="container packs-section" id="packsSection">
        <div class="series-selector">
            <button class="series-btn active" data-series="all">Toutes les séries</button>
            <button class="series-btn" data-series="151">151</button>
            <button class="series-btn" data-series="ecarlate">Écarlate et Violet</button>
            <button class="series-btn" data-series="evolving">Évolutions célestes</button>
            <button class="series-btn" data-series="transendants">Héros transendants</button>
            <button class="series-btn" data-series="gx">GX Ultra</button>
            <button class="series-btn" data-series="epee">Épée et Bouclier</button>
            <button class="series-btn" data-series="soleil">Soleil et Lune</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="packCount">10</div>

            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Cartes collectionnées</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="uniqueCards">0</div>
                <div class="stat-label">Cartes uniques</div>
            </div>
        </div>

        <div class="packs-grid" id="packsGrid"></div>
    </div>

    <div class="container collection-section" id="collectionSection">
        <div class="collection-filters">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="commune">Communes</button>
            <button class="filter-btn" data-filter="rare">Rares</button>
            <button class="filter-btn" data-filter="ultra-rare">Ultra Rares</button>
            <button class="filter-btn" data-filter="151">Série 151</button>
            <button class="filter-btn" data-filter="ecarlate">Écarlate et Violet</button>
            <button class="filter-btn" data-filter="evolving">Évolutions célestes</button>
        </div>

        <div class="collection-grid" id="collectionGrid"></div>
    </div>

    <div class="pack-opening" id="packOpening">
        <div class="opening-animation">
            <h2 style="color: #ffd700;">Ouverture du booster...</h2>
            <div class="opening-cards" id="openingCards"></div>
            <button class="close-opening" id="closeOpening">Fermer</button>
        </div>
    </div>

                { id: 605, name: 'Lunala GX', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm1/60.png', number: '60/149', set: 'Sun & Moon' }

        let userCollection = [];
        let availablePacks = 10;
        let currentSeries = 'all';
        let currentFilter = 'all';

        // Charger la collection
        function loadCollection() {
            const saved = localStorage.getItem('pokemonCollection');
            if (saved) {
                userCollection = JSON.parse(saved);
            }
            updateStats();
        }

        // Sauvegarder la collection
        function saveCollection() {
            localStorage.setItem('pokemonCollection', JSON.stringify(userCollection));
            updateStats();
        }

        // Mettre à jour les statistiques
        function updateStats() {
            document.getElementById('packCount').textContent = availablePacks;
            document.getElementById('totalCards').textContent = userCollection.length;
            
            const uniqueCards = new Set(userCollection.map(card => 
                card.series + '-' + card.id
            )).size;
            document.getElementById('uniqueCards').textContent = uniqueCards;
        }

        // Générer les packs
        function renderPacks() {
            const packsGrid = document.getElementById('packsGrid');
            packsGrid.innerHTML = '';
            
            const series = currentSeries === 'all' ? Object.keys(cardDatabase) : [currentSeries];

            const seriesDisplayNames = {
                '151': '151',
                'ecarlate': 'Écarlate et Violet',
                'evolving': 'Évolutions célestes',
                'transendants': 'Héros transendants',
                'gx': 'GX Ultra',
                'epee': 'Épée et Bouclier',
                'soleil': 'Soleil et Lune'
            };

            series.forEach(seriesName => {
                for (let i = 0; i < 3; i++) {
                    const pack = document.createElement('div');
                    pack.className = `pack-card ${availablePacks <= 0 ? 'disabled' : ''}`;
                    pack.dataset.series = seriesName;
                    pack.dataset.packIndex = i;
                    
                    let packImage = 'https://images.pokemontcg.io/base1/logo.png';
                    if (seriesName === 'ecarlate') packImage = 'https://images.pokemontcg.io/sv1/logo.png';
                    else if (seriesName === 'evolving') packImage = 'https://images.pokemontcg.io/sm5/logo.png';
                    
                    pack.innerHTML = `
                        <img src="${packImage}" alt="${seriesDisplayNames[seriesName]}" class="pack-image" onerror="this.src='https://via.placeholder.com/200x200?text=Pokemon+Pack'">
                        <div class="pack-name">Booster ${seriesDisplayNames[seriesName]}</div>
                        <div class="pack-price">5 cartes</div>
                        <div class="pack-count">Pack ${i + 1}/3</div>
                    `;
                    
                    pack.addEventListener('click', function(e) {
                        e.stopPropagation();
                        openPack(this.dataset.series);
                    });
                    
                    packsGrid.appendChild(pack);
                }
            });
        }

        // Ouvrir un pack
        function openPack(series) {
            if (availablePacks <= 0) {
                alert('Plus de boosters disponibles ! Revenez plus tard !');
                return;
            }

            availablePacks--;
            
            const seriesCards = cardDatabase[series];
            const openedCards = [];
            
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * seriesCards.length);
                const randomCard = {...seriesCards[randomIndex]};
                randomCard.series = series;
                randomCard.id = randomCard.id + Date.now() + i;
                openedCards.push(randomCard);
                userCollection.push(randomCard);
            }

            showPackOpening(openedCards);
            saveCollection();
            renderPacks();
            
            if (document.getElementById('collectionSection').classList.contains('active')) {
                renderCollection();
            }
        }

        // Afficher l'ouverture
        function showPackOpening(cards) {
            const opening = document.getElementById('packOpening');
            const cardsContainer = document.getElementById('openingCards');
            
            cardsContainer.innerHTML = '';
            cards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'opening-card';
                cardEl.style.animationDelay = `${index * 0.1}s`;
                cardEl.innerHTML = `
                    <img src="${card.image}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/200x280?text=${card.name}'">
                    <div class="card-name">${card.name}</div>
                    <div class="card-rarity">${card.rarity}</div>
                `;
                cardsContainer.appendChild(cardEl);
            });
            
            opening.classList.add('active');
        }

        // Afficher la collection
        function renderCollection() {
            const collectionGrid = document.getElementById('collectionGrid');
            collectionGrid.innerHTML = '';
            
            let filteredCards = [...userCollection];
            
            if (currentFilter !== 'all') {
                if (['commune', 'rare', 'ultra-rare'].includes(currentFilter)) {
                    filteredCards = filteredCards.filter(card => card.rarity === currentFilter);
                } else {
                    filteredCards = filteredCards.filter(card => card.series === currentFilter);
                }
            }
            
            const cardCounts = {};
            filteredCards.forEach(card => {
                const key = card.series + '-' + card.id;
                cardCounts[key] = (cardCounts[key] || 0) + 1;
            });
            
            const uniqueCards = [];
            const seen = new Set();
            
            filteredCards.forEach(card => {
                const key = card.series + '-' + card.id;
                if (!seen.has(key)) {
                    seen.add(key);
                    uniqueCards.push({...card, count: cardCounts[key]});
                }
            });
            
            uniqueCards.sort((a, b) => a.name.localeCompare(b.name));
            
            uniqueCards.forEach(card => {
                const cardEl = document.createElement('div');
                cardEl.className = `collection-card ${card.rarity}`;
                cardEl.innerHTML = `
                    <div class="card-rarity">${card.rarity}</div>
                    <img src="${card.image}" alt="${card.name}" onerror="this.src='https://via.placeholder.com/200x280?text=${card.name}'">
                    <div class="card-name">${card.name}</div>
                    <div class="card-series">${card.series}</div>
                    <div class="card-count">x${card.count}</div>
                `;
                collectionGrid.appendChild(cardEl);
            });
            
            if (uniqueCards.length === 0) {
                collectionGrid.innerHTML = '<div class="loading">Aucune carte dans cette catégorie</div>';
            }
        }
