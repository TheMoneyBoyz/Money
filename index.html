<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCGPocket - Collection de Cartes Réelles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            min-height: 100vh;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            border: none;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* Sections */
        .packs-section {
            display: block;
        }

        .collection-section {
            display: none;
        }

        .collection-section.active {
            display: block;
        }

        /* Series Selector */
        .series-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .series-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .series-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            transform: scale(1.05);
            border: none;
        }

        .series-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Stats */
        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
        }

        .stat-label {
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* Packs Grid */
        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .pack-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pack-card:hover {
            transform: translateY(-10px) scale(1.02);
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .pack-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .pack-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 1rem;
            border-radius: 15px;
        }

        .pack-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: white;
        }

        .pack-price {
            color: #ffd700;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .pack-count {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Pack Opening Animation */
        .pack-opening {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .pack-opening.active {
            opacity: 1;
            pointer-events: all;
        }

        .opening-animation {
            background: linear-gradient(135deg, #2a2a40, #1e1e2f);
            padding: 3rem;
            border-radius: 30px;
            text-align: center;
            color: white;
            transform: scale(0.8);
            transition: transform 0.3s ease;
            border: 2px solid rgba(255, 215, 0, 0.3);
            max-width: 1200px;
            width: 90%;
        }

        .pack-opening.active .opening-animation {
            transform: scale(1);
        }

        .opening-cards {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            margin: 2rem 0;
        }

        .opening-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1rem;
            animation: cardReveal 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .opening-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .close-opening {
            padding: 1rem 3rem;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            border: none;
            border-radius: 30px;
            color: #1e1e2f;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .close-opening:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        /* Collection Filters */
        .collection-filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            justify-content: center;
        }

        .filter-btn {
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Collection Grid */
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .collection-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .collection-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #ffd700;
        }

        .collection-card.ultra-rare {
            border: 3px solid gold;
            box-shadow: 0 0 20px gold;
        }

        .collection-card.rare {
            border: 2px solid silver;
        }

        .card-rarity {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #1e1e2f;
            font-weight: bold;
            z-index: 2;
        }

        .collection-card img {
            width: 100%;
            height: 200px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }

        .card-name {
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: white;
            font-size: 1.1rem;
        }

        .card-series {
            color: #ffd700;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .card-count {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            background: #28a745;
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="nav">
            <div class="logo" id="logoBtn">Pokémon TCGPocket</div>
            <div class="nav-buttons">
                <button class="nav-btn active" id="packsBtn">Boosters</button>
                <button class="nav-btn" id="collectionBtn">Ma Collection</button>
            </div>
        </div>
    </div>

    <!-- Section Packs -->
    <div class="container packs-section" id="packsSection">
        <div class="series-selector" id="seriesSelector">
            <button class="series-btn active" data-series="all">Toutes les séries</button>
            <button class="series-btn" data-series="151">151</button>
            <button class="series-btn" data-series="ecarlate">Écarlate et Violet</button>
            <button class="series-btn" data-series="evolving">Évolutions célestes</button>
            <button class="series-btn" data-series="transendants">Héros transendants</button>
            <button class="series-btn" data-series="gx">GX Ultra</button>
            <button class="series-btn" data-series="epee">Épée et Bouclier</button>
            <button class="series-btn" data-series="soleil">Soleil et Lune</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="packCount">10</div>
                <div class="stat-label">Boosters disponibles</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">Cartes collectionnées</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="uniqueCards">0</div>
                <div class="stat-label">Cartes uniques</div>
            </div>
        </div>

        <div class="packs-grid" id="packsGrid"></div>
    </div>

    <!-- Section Collection -->
    <div class="container collection-section" id="collectionSection">
        <div class="collection-filters" id="collectionFilters">
            <button class="filter-btn active" data-filter="all">Toutes</button>
            <button class="filter-btn" data-filter="commune">Communes</button>
            <button class="filter-btn" data-filter="rare">Rares</button>
            <button class="filter-btn" data-filter="ultra-rare">Ultra Rares</button>
            <button class="filter-btn" data-filter="151">Série 151</button>
            <button class="filter-btn" data-filter="ecarlate">Écarlate et Violet</button>
            <button class="filter-btn" data-filter="evolving">Évolutions célestes</button>
        </div>

        <div class="collection-grid" id="collectionGrid"></div>
    </div>

    <!-- Animation d'ouverture -->
    <div class="pack-opening" id="packOpening">
        <div class="opening-animation">
            <h2 style="color: #ffd700;">Ouverture du booster...</h2>
            <div class="opening-cards" id="openingCards"></div>
            <button class="close-opening" id="closeOpening">Fermer</button>
        </div>
    </div>

    <script>
        // Base de données des cartes
        const cardDatabase = {
            '151': [
                { id: 1, name: 'Bulbizarre', rarity: 'commune', image: 'https://images.pokemontcg.io/base1/1.png', set: 'Base Set' },
                { id: 2, name: 'Salamèche', rarity: 'commune', image: 'https://images.pokemontcg.io/base1/4.png', set: 'Base Set' },
                { id: 3, name: 'Carapuce', rarity: 'commune', image: 'https://images.pokemontcg.io/base1/7.png', set: 'Base Set' },
                { id: 4, name: 'Pikachu', rarity: 'rare', image: 'https://images.pokemontcg.io/base1/58.png', set: 'Base Set' },
                { id: 5, name: 'Mewtwo', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/base1/10.png', set: 'Base Set' },
                { id: 6, name: 'Dracaufeu', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/base1/4_hires.png', set: 'Base Set' }
            ],
            'ecarlate': [
                { id: 101, name: 'Poussacha', rarity: 'commune', image: 'https://images.pokemontcg.io/sv1/1.png', set: 'Scarlet & Violet' },
                { id: 102, name: 'Chochodile', rarity: 'commune', image: 'https://images.pokemontcg.io/sv1/4.png', set: 'Scarlet & Violet' },
                { id: 103, name: 'Coiffeton', rarity: 'commune', image: 'https://images.pokemontcg.io/sv1/7.png', set: 'Scarlet & Violet' },
                { id: 104, name: 'Miraidon', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sv1/81.png', set: 'Scarlet & Violet' }
            ],
            'evolving': [
                { id: 201, name: 'Évoli', rarity: 'commune', image: 'https://images.pokemontcg.io/sm5/89.png', set: 'Ultra Prism' },
                { id: 202, name: 'Pyroli', rarity: 'rare', image: 'https://images.pokemontcg.io/sm5/22.png', set: 'Ultra Prism' },
                { id: 203, name: 'Aquali', rarity: 'rare', image: 'https://images.pokemontcg.io/sm5/30.png', set: 'Ultra Prism' },
                { id: 204, name: 'Voltali', rarity: 'rare', image: 'https://images.pokemontcg.io/sm5/38.png', set: 'Ultra Prism' }
            ],
            'transendants': [
                { id: 301, name: 'Dracofeu', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm9/4.png', set: 'Team Up' },
                { id: 302, name: 'Lugia', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm8/78.png', set: 'Lost Thunder' },
                { id: 303, name: 'Rayquaza', rarity: 'rare', image: 'https://images.pokemontcg.io/sm7/106.png', set: 'Celestial Storm' }
            ],
            'gx': [
                { id: 401, name: 'Pikachu GX', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm1/27.png', set: 'Sun & Moon' },
                { id: 402, name: 'Dracaufeu GX', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm3/3.png', set: 'Burning Shadows' }
            ],
            'epee': [
                { id: 501, name: 'Ouistempo', rarity: 'commune', image: 'https://images.pokemontcg.io/swsh1/1.png', set: 'Sword & Shield' },
                { id: 502, name: 'Zacian V', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/swsh1/138.png', set: 'Sword & Shield' }
            ],
            'soleil': [
                { id: 601, name: 'Brindibou', rarity: 'commune', image: 'https://images.pokemontcg.io/sm1/1.png', set: 'Sun & Moon' },
                { id: 602, name: 'Solgaleo GX', rarity: 'ultra-rare', image: 'https://images.pokemontcg.io/sm1/89.png', set: 'Sun & Moon' }
            ]
        };

        // Variables globales
        let userCollection = [];
        let availablePacks = 10;
        let currentSeries = 'all';
        let currentFilter = 'all';

        // Charger la collection
        function loadCollection() {
            const saved = localStorage.getItem('pokemonCollection');
            if (saved) {
                userCollection = JSON.parse(saved);
            }
            updateStats();
        }

        // Sauvegarder la collection
        function saveCollection() {
            localStorage.setItem('pokemonCollection', JSON.stringify(userCollection));
            updateStats();
        }

        // Mettre à jour les stats
        function updateStats() {
            document.getElementById('packCount').textContent = availablePacks;
            document.getElementById('totalCards').textContent = userCollection.length;
            
            const uniqueCards = new Set(userCollection.map(card => 
                card.series + '-' + card.originalId
            )).size;
            document.getElementById('uniqueCards').textContent = uniqueCards;
        }

        // Générer les packs
        function renderPacks() {
            const packsGrid = document.getElementById('packsGrid');
            packsGrid.innerHTML = '';
            
            const seriesToShow = currentSeries === 'all' ? Object.keys(cardDatabase) : [currentSeries];
            
            const seriesNames = {
                '151': '151', 'ecarlate': 'Écarlate et Violet', 'evolving': 'Évolutions célestes',
                'transendants': 'Héros transendants', 'gx': 'GX Ultra', 'epee': 'Épée et Bouclier', 'soleil': 'Soleil et Lune'
            };

            seriesToShow.forEach(series => {
                for (let i = 0; i < 3; i++) {
                    const pack = document.createElement('div');
                    pack.className = `pack-card ${availablePacks <= 0 ? 'disabled' : ''}`;
                    pack.setAttribute('data-series', series);
                    
                    pack.innerHTML = `
                        <img src="https://images.pokemontcg.io/base1/logo.png" class="pack-image" onerror="this.src='https://via.placeholder.com/200x200?text=Pack'">
                        <div class="pack-name">Booster ${seriesNames[series]}</div>
                        <div class="pack-price">5 cartes</div>
                        <div class="pack-count">Pack ${i + 1}/3</div>
                    `;
                    
                    pack.onclick = function() {
                        const series = this.getAttribute('data-series');
                        openPack(series);
                    };
                    
                    packsGrid.appendChild(pack);
                }
            });
        }

        // Ouvrir un pack
        function openPack(series) {
            if (availablePacks <= 0) {
                alert('Plus de boosters disponibles !');
                return;
            }

            availablePacks--;
            
            const cards = cardDatabase[series];
            const openedCards = [];
            
            for (let i = 0; i < 5; i++) {
                const randomIndex = Math.floor(Math.random() * cards.length);
                const card = {...cards[randomIndex]};
                card.originalId = card.id;
                card.id = card.id + Date.now() + i;
                card.series = series;
                openedCards.push(card);
                userCollection.push(card);
            }

            // Afficher l'animation
            const opening = document.getElementById('packOpening');
            const cardsContainer = document.getElementById('openingCards');
            cardsContainer.innerHTML = '';
            
            openedCards.forEach((card, index) => {
                const cardEl = document.createElement('div');
                cardEl.className = 'opening-card';
                cardEl.style.animationDelay = `${index * 0.1}s`;
                cardEl.innerHTML = `
                    <img src="${card.image}" onerror="this.src='https://via.placeholder.com/200x280?text=${card.name}'">
                    <div class="card-name">${card.name}</div>
                    <div class="card-rarity">${card.rarity}</div>
                `;
                cardsContainer.appendChild(cardEl);
            });
            
            opening.classList.add('active');
            
            saveCollection();
            renderPacks();
            updateStats();
            
            if (document.getElementById('collectionSection').classList.contains('active')) {
                renderCollection();
            }
        }

        // Afficher la collection
        function renderCollection() {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = '';
            
            let filtered = [...userCollection];
            
            if (currentFilter !== 'all') {
                if (['commune', 'rare', 'ultra-rare'].includes(currentFilter)) {
                    filtered = filtered.filter(c => c.rarity === currentFilter);
                } else {
                    filtered = filtered.filter(c => c.series === currentFilter);
                }
            }
            
            // Compter les doublons
            const counts = {};
            filtered.forEach(card => {
                const key = card.series + '-' + card.originalId;
                counts[key] = (counts[key] || 0) + 1;
            });
            
            // Cartes uniques
            const seen = new Set();
            const unique = [];
            
            filtered.forEach(card => {
                const key = card.series + '-' + card.originalId;
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push({...card, count: counts[key]});
                }
            });
            
            unique.sort((a, b) => a.name.localeCompare(b.name));
            
            unique.forEach(card => {
                const el = document.createElement('div');
                el.className = `collection-card ${card.rarity}`;
                el.innerHTML = `
                    <div class="card-rarity">${card.rarity}</div>
                    <img src="${card.image}" onerror="this.src='https://via.placeholder.com/200x280?text=${card.name}'">
                    <div class="card-name">${card.name}</div>
                    <div class="card-series">${card.series}</div>
                    <div class="card-count">x${card.count}</div>
                `;
                grid.appendChild(el);
            });
            
            if (unique.length === 0) {
                grid.innerHTML = '<div class="loading">Aucune carte dans cette catégorie</div>';
            }
        }

        // Initialisation des événements
        document.addEventListener('DOMContentLoaded', function() {
            // Navigation
            document.getElementById('logoBtn').onclick = function() {
                switchSection('packs');
            };
            
            document.getElementById('packsBtn').onclick = function() {
                switchSection('packs');
            };
            
            document.getElementById('collectionBtn').onclick = function() {
                switchSection('collection');
            };
            
            // Filtres des séries
            document.querySelectorAll('#seriesSelector .series-btn').forEach(btn => {
                btn.onclick = function() {
                    document.querySelectorAll('#seriesSelector .series-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentSeries = this.getAttribute('data-series');
                    renderPacks();
                };
            });
            
            // Filtres de collection
            document.querySelectorAll('#collectionFilters .filter-btn').forEach(btn => {
                btn.onclick = function() {
                    document.querySelectorAll('#collectionFilters .filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.getAttribute('data-filter');
                    renderCollection();
                };
            });
            
            // Fermer l'animation
            document.getElementById('closeOpening').onclick = function() {
                document.getElementById('packOpening').classList.remove('active');
            };
            
            // Charger les données
            loadCollection();
            renderPacks();
            
            // Recharge des packs (toutes les heures)
            setInterval(() => {
                availablePacks = Math.min(availablePacks + 1, 10);
                updateStats();
                renderPacks();
            }, 3600000);
        });

        // Changer de section
        function switchSection(section) {
            const packsSection = document.getElementById('packsSection');
            const collectionSection = document.getElementById('collectionSection');
            const packsBtn = document.getElementById('packsBtn');
            const collectionBtn = document.getElementById('collectionBtn');
            
            if (section === 'packs') {
                packsSection.style.display = 'block';
                collectionSection.classList.remove('active');
                packsBtn.classList.add('active');
                collectionBtn.classList.remove('active');
                renderPacks();
            } else {
                packsSection.style.display = 'none';
                collectionSection.classList.add('active');
                packsBtn.classList.remove('active');
                collectionBtn.classList.add('active');
                renderCollection();
            }
        }
    </script>
</body>
</html>
